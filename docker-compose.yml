services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-backend
    ports:
      - "8080:8080"
    volumes:
      # Windows sürücüleri container içine bağla
      # Docker Desktop > Settings > Resources > File Sharing kısmında C:\ açık olmalı
      - C:\:/c_drive:rw
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
